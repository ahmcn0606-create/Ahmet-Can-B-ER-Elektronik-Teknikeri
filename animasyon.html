<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ACB 3D Sarmal Motoru</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { width: 100%; height: 100%; overflow: hidden; background-color: transparent; }
        #canvas-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
    </style>
</head>
<body>

    <div id="canvas-container"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>

    <script>
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x0b0b0b, 0.035);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 0, 25); 

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.2;
        container.appendChild(renderer.domElement);

        const ambientLight = new THREE.AmbientLight(0x111111, 1.5);
        scene.add(ambientLight);

        const topLight = new THREE.DirectionalLight(0xffffff, 2);
        topLight.position.set(5, 20, 10);
        scene.add(topLight);

        const backGlow = new THREE.PointLight(0xffffff, 2, 50);
        backGlow.position.set(-10, 0, -5);
        scene.add(backGlow);

        const dnaGroup = new THREE.Group();
        const numNodes = 60; 
        const radius = 4;
        const twistSpeed = 0.4; 
        const phaseDifference = 2.2; 

        // Senin İstediğin Gibi Siyah-Beyaz / Gümüş Asil Tonlar
        const strandMat1 = new THREE.MeshStandardMaterial({ color: 0xffffff, metalness: 0.9, roughness: 0.1 });
        const strandMat2 = new THREE.MeshStandardMaterial({ color: 0x888888, metalness: 0.9, roughness: 0.1 });
        const baseMat = new THREE.MeshStandardMaterial({ color: 0x444444, metalness: 0.5, roughness: 0.4 });

        const pointsStrand1 = [];
        const pointsStrand2 = [];

        for (let i = 0; i < numNodes; i++) {
            const y = (i * 0.6) - (numNodes * 0.3); 
            const angle = i * twistSpeed;

            const x1 = Math.sin(angle) * radius;
            const z1 = Math.cos(angle) * radius;
            pointsStrand1.push(new THREE.Vector3(x1, y, z1));

            const x2 = Math.sin(angle + phaseDifference) * radius;
            const z2 = Math.cos(angle + phaseDifference) * radius;
            pointsStrand2.push(new THREE.Vector3(x2, y, z2));

            if (i % 2 === 0) {
                const p1 = new THREE.Vector3(x1, y, z1);
                const p2 = new THREE.Vector3(x2, y, z2);
                
                const distance = p1.distanceTo(p2);
                const cylinderGeom = new THREE.CylinderGeometry(0.08, 0.08, distance, 12);
                
                const connectionGroup = new THREE.Group();
                const cylinder = new THREE.Mesh(cylinderGeom, baseMat);
                cylinder.position.y = distance / 2;
                cylinder.rotation.x = Math.PI / 2; 
                connectionGroup.add(cylinder);
                
                connectionGroup.position.copy(p1);
                connectionGroup.lookAt(p2);
                dnaGroup.add(connectionGroup);

                const atomGeom = new THREE.SphereGeometry(0.25, 16, 16);
                const atom1 = new THREE.Mesh(atomGeom, strandMat1);
                atom1.position.copy(p1);
                const atom2 = new THREE.Mesh(atomGeom, strandMat2);
                atom2.position.copy(p2);
                dnaGroup.add(atom1, atom2);
            }
        }

        const curve1 = new THREE.CatmullRomCurve3(pointsStrand1);
        const tubeGeom1 = new THREE.TubeGeometry(curve1, 100, 0.15, 16, false);
        const tube1 = new THREE.Mesh(tubeGeom1, strandMat1);

        const curve2 = new THREE.CatmullRomCurve3(pointsStrand2);
        const tubeGeom2 = new THREE.TubeGeometry(curve2, 100, 0.15, 16, false);
        const tube2 = new THREE.Mesh(tubeGeom2, strandMat2);

        dnaGroup.add(tube1, tube2);
        scene.add(dnaGroup);

        gsap.registerPlugin(ScrollTrigger);

        // Ana sayfanın scroll takibini sağlayan pürüzsüz mekanizma
        gsap.to(dnaGroup.position, {
            scrollTrigger: {
                trigger: window.parent.document.body,
                start: "top top",
                end: "bottom bottom",
                scrub: 1
            },
            y: -5,
            ease: "none"
        });

        function animate() {
            requestAnimationFrame(animate);
            dnaGroup.rotation.y += 0.01; // Kendi etrafında akıcı dönüş
            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
