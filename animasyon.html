<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Sinyal İşleme Motoru</title>
    <style>
        body { margin: 0; background: #050505; overflow: hidden; }
        canvas { display: block; }
    </style>
</head>
<body>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({antialias: true, alpha: true});
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const geometry = new THREE.BufferGeometry();
        const material = new THREE.LineBasicMaterial({ color: 0x00e5ff, transparent: true, opacity: 0.6 });
        const positions = new Float32Array(2000 * 3);
        geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        const line = new THREE.Line(geometry, material);
        scene.add(line);

        camera.position.z = 5;
        let time = 0;

        function animate() {
            requestAnimationFrame(animate);
            time += 0.05;
            const positions = line.geometry.attributes.position.array;
            for(let i = 0; i < 2000; i++) {
                const x = (i - 1000) * 0.01;
                const y = Math.sin(x * 5 + time) * 0.5 + (Math.random() - 0.5) * 0.2;
                positions[i*3] = x;
                positions[i*3+1] = y;
                positions[i*3+2] = 0;
            }
            line.geometry.attributes.position.needsUpdate = true;
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
