<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8"> 
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- TARAYICI SEKMESİNE İKON VE BAŞLIK -->
    <link rel="icon" type="image/png" href="ACB MONOGRAM_SİYAH.png">
    <title>Ahmet Can BİÇER │ Elektronik Teknikeri</title>
    
    <link rel="stylesheet" href="css-style.css">
</head>
<body>

    <!-- YENİ SADE VE TEKNOLOJİK AÇILIŞ INTROSU (YAZISIZ VE SADECE PARLAMA EFEKTLİ) -->
    <div class="preloader" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #0b0b0b; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 9999; transition: opacity 0.6s ease;">
        
        <!-- Sade ve Şık Efekt Grubu -->
        <div style="position: relative; width: 100px; height: 100px; display: flex; justify-content: center; align-items: center;">
            
            <!-- Etrafında Hafifçe Dönen İnce Teknoloji Halkası -->
            <div style="position: absolute; width: 100%; height: 100%; border: 2px solid rgba(255, 255, 255, 0.05); border-top: 2px solid #ffffff; border-radius: 50%; animation: spinRing 2s linear infinite;"></div>
            
            <!-- Ortada Yumuşakça Parlayarak Büyüyen Türk Bayrağı Monogramı -->
            <img src="ACB MONOGRAM_BEYAZ.png" alt="ACB Monogram" style="width: 60px; height: auto; border-radius: 4px; filter: drop-shadow(0 0 15px rgba(255,255,255,0.3)); animation: pulseGlow 2s ease-in-out infinite;">
        </div>
    </div>

    <!-- Yeni Efektlerin CSS Kodları -->
    <style>
        @keyframes spinRing {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        @keyframes pulseGlow {
            0% { transform: scale(0.95); opacity: 0.6; filter: drop-shadow(0 0 5px rgba(255,255,255,0.1)); }
            50% { transform: scale(1.05); opacity: 1; filter: drop-shadow(0 0 20px rgba(255,255,255,0.4)); }
            100% { transform: scale(0.95); opacity: 0.6; filter: drop-shadow(0 0 5px rgba(255,255,255,0.1)); }
        }
    </style>

    <!-- ÜST MENÜ -->
    <nav class="navbar">
        <div class="navbar-brand">
            <div class="brand-text">Ahmet Can BİÇER</div>
        </div>
        <ul class="nav-links">
            <li><a href="index.html" class="active">Ana Sayfa</a></li>
            <li><a href="hakkimda.html">Hakkımda</a></li>
            <li><a href="projelerim.html">Projelerim</a></li>
            <li><a href="iletisim.html">İletişim</a></li>
        </ul>
    </nav>

    <!-- ANA ALAN VE PROFİL RESMİ -->
    <main class="container" style="display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 70vh; text-align: center; padding: 40px 20px;">
        
        <div style="margin-bottom: 25px;">
            <img src="anasayfa_fotograf.jpeg" alt="Ahmet Can Biçer" style="width: 160px; height: 160px; border-radius: 50%; object-fit: cover; border: 3px solid #ffffff; box-shadow: 0 8px 20px rgba(0,0,0,0.3);">
        </div>

        <h1 style="font-size: 36px; font-weight: 800; color: #ffffff; margin-bottom: 10px;">Ahmet Can BİÇER</h1>
        <h2 style="font-size: 18px; color: #a0a0a0; font-weight: 500; letter-spacing: 1px; margin-bottom: 30px;">Elektronik Teknikeri</h2>

        <!-- SAVUNMA TEKNOLOJİLERİ GIF ALANI -->
        <div class="tech-video-container" style="max-width: 450px; margin: 0 auto 30px auto;">
            <img src="savunma_teknoloji.gif" alt="Teknoloji Vitrini" style="width: 100%; border-radius: 8px;">
        </div>

        <a href="projelerim.html" class="btn" style="padding: 12px 30px; text-transform: uppercase;">Keşfetmeye Başla</a>
    </main>

    <!-- FOOTER -->
    <footer style="padding: 20px; text-align: center; color: #666; font-size: 13px;">
        &copy; 2026 Ahmet Can Biçer. Tüm Hakları Saklıdır.
    </footer>

    <!-- ZAMANLAYICI SCRIPT -->
    <script>
        window.addEventListener('load', () => {
            const preloader = document.querySelector('.preloader');
            // Tam 3 saniye sonra introyu yumuşatarak kapatır
            setTimeout(() => {
                if (preloader) {
                    preloader.style.opacity = '0';
                    setTimeout(() => preloader.style.display = 'none', 600);
                }
            }, 3000); 
        });
    </script>

</body>
</html>
