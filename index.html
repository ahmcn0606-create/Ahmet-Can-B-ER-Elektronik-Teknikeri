<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="ACB MONOGRAM_SİYAH.png">
    <title>Ahmet Can BİÇER │ Elektronik Teknikeri</title>
    <link rel="stylesheet" href="css-style.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { width: 100%; height: 100%; background-color: #050505; color: #ffffff; font-family: 'Segoe UI', Roboto, sans-serif; overflow-x: hidden; }
        
        /* Izgara Efekti */
        body::before { content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-image: radial-gradient(rgba(255, 0, 51, 0.05) 1px, transparent 1px); background-size: 30px 30px; z-index: -1; pointer-events: none; }
        
        .navbar { display: flex; justify-content: space-between; align-items: center; padding: 15px 40px; background: rgba(10, 10, 10, 0.6); backdrop-filter: blur(10px); position: fixed; width: 100%; top: 0; z-index: 999; border-bottom: 1px solid rgba(255, 0, 51, 0.1); }
        .navbar-brand { display: flex; align-items: center; padding-right: 15px; border-right: 1px solid rgba(255, 0, 51, 0.1); height: 35px; }
        .nav-links { display: flex; align-items: center; gap: 20px; list-style: none; }
        .nav-links a { color: #cccccc; text-decoration: none; font-size: 14px; font-weight: 500; }
        
        #sarmal-frame { position: fixed; top: 0; left: 0; width: 100%; height: 100%; border: none; background: transparent; z-index: 1; pointer-events: auto; }
        
        .content-layer { position: relative; z-index: 2; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; text-align: center; pointer-events: none; }
        
        @media (max-width: 768px) {
            .navbar { padding: 12px 20px; flex-direction: column; gap: 12px; }
            .navbar-brand { border-right: none; height: auto; }
            .nav-links { gap: 15px; flex-wrap: wrap; justify-content: center; }
            .content-layer { padding-top: 140px; }
        }

        #spaceCanvas {
    position: fixed;
    top: 0;
    left: 0;
    width: 100vw;
    height: 100vh;
    z-index: 1; /* En arkada olması için */
    background: #000;
}
    </style>
</head>
<body>
    <div class="preloader" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #050505; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 9999; transition: opacity 0.6s ease;">
        <div style="position: relative; width: 180px; height: 180px; display: flex; justify-content: center; align-items: center;">
            <div style="position: absolute; width: 100%; height: 100%; border: 3px solid rgba(255, 0, 51, 0.1); border-top: 3px solid #ff0033; border-radius: 50%; animation: spinRing 2s linear infinite;"></div>
            <img src="ACB MONOGRAM_BEYAZ.png" alt="ACB Monogram" style="width: 130px; height: auto; filter: drop-shadow(0 0 20px rgba(255, 0, 51, 0.5)); animation: pulseGlow 2s ease-in-out infinite;">
        </div>
    </div>

    <style>
        @keyframes spinRing { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        @keyframes pulseGlow { 0% { transform: scale(0.95); opacity: 0.7; } 50% { transform: scale(1.05); opacity: 1; } 100% { transform: scale(0.95); opacity: 0.7; } }
    </style>

    <iframe src="animasyon.html" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; border: none; z-index: -1;"></iframe>

    <div class="content-layer">
      <nav class="navbar" style="pointer-events: auto;">
            <div class="navbar-brand" style="border: 1px solid #ffffff; border-radius: 50%; padding: 4px; box-shadow: 0 0 10px rgba(255, 0, 51, 0.6);">
                <img src="ACB MONOGRAM_BEYAZ.png" alt="ACB Logo" style="width: 30px; height: auto; display: block;">
            </div>
            <ul class="nav-links">
                <li><a href="index.html" style="color: #ff0033; font-weight: 600;">Ana Sayfa</a></li>
                <li><a href="hakkimda.html">Hakkımda</a></li>
                <li><a href="iletisim.html">İletişim</a></li>
                <li style="display: flex; align-items: center; gap: 8px; padding-left: 15px; border-left: 1px solid rgba(255, 0, 51, 0.2);">
                    <span style="font-size: 13px; font-weight: 700; color: #ffffff;">TR</span>
                    <img src="turk-bayraki.png" alt="Türk Bayrağı" style="width: 24px; height: auto; display: block; border-radius: 2px;">
                </li>
            </ul>
        </nav>
    </div>

    <footer style="position: fixed; bottom: 0; left: 0; padding: 25px; text-align: center; color: #555; font-size: 12px; width: 100%; border-top: 1px solid rgba(255, 0, 51, 0.05); z-index: 10; pointer-events: none;">&copy; 2026 Ahmet Can Biçer. Tüm Hakları Saklıdır.</footer>

    <script>
        const preloader = document.querySelector('.preloader');
        const isPageRefreshed = performance.getEntriesByType("navigation")[0]?.type === "reload";
        if (isPageRefreshed) { window.addEventListener('load', () => { setTimeout(() => { preloader.style.opacity = '0'; setTimeout(() => preloader.style.display = 'none', 600); }, 3000); }); } else { preloader.style.display = 'none'; }
    </script>

    <canvas id="spaceCanvas"></canvas>
<script>
    window.onload = function() {
        const canvas = document.getElementById('spaceCanvas');
        const ctx = canvas.getContext('2d');
        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.onresize = resize;
        resize();

        let stars = Array.from({length: 400}, () => ({
            x: Math.random() * canvas.width,
            y: Math.random() * canvas.height,
            size: Math.random() * 1.5,
            opacity: Math.random()
        }));

        function animate() {
            ctx.fillStyle = "#000";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            stars.forEach(s => {
                ctx.fillStyle = `rgba(255, 255, 255, ${s.opacity})`;
                ctx.beginPath();
                ctx.arc(s.x, s.y, s.size, 0, Math.PI * 2);
                ctx.fill();
            });
            requestAnimationFrame(animate);
        }
        animate();
    };
</script>
</body>
</html>
