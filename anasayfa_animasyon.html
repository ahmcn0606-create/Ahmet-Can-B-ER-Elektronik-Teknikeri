<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Tünel Motoru</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { width: 100%; height: 100%; overflow: hidden; background-color: #010103; }
        #canvas-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
    </style>
</head>
<body>

    <div id="canvas-container"></div>

    <!-- Gerekli Animasyon Kütüphaneleri -->
    <script src="https://cloudflare.com"></script>
    <script src="https://cloudflare.com"></script>
    <script src="https://cloudflare.com"></script>

    <script>
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x010103, 0.05);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.z = 30;

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        container.appendChild(renderer.domElement);

        const rings = [];
        const ringCount = 28;

        for (let i = 0; i < ringCount; i++) {
            const geometry = new THREE.TorusGeometry(8, 0.04, 16, 100);
            const material = new THREE.MeshBasicMaterial({ 
                color: i % 2 === 0 ? 0x00ffcc : 0xffffff,
                wireframe: true,
                transparent: true,
                opacity: 0.4
            });
            const ring = new THREE.Mesh(geometry, material);
            ring.position.z = -i * 4.5;
            ring.position.x = Math.sin(i * 0.5) * 1.5;
            scene.add(ring);
            rings.push(ring);
        }

        gsap.registerPlugin(ScrollTrigger);

        // Ana sayfadaki kaydırma hareketini dinlemesi için üst pencereyi (parent) hedef alıyoruz
        gsap.to(camera.position, {
            scrollTrigger: {
                trigger: window.parent.document.body, // Ana sayfanın scroll alanını tetikler
                start: "top top",
                end: "bottom bottom",
                scrub: 1
            },
            z: -85, 
            y: -3,
            ease: "none"
        });

        function animate() {
            requestAnimationFrame(animate);
            rings.forEach((ring, index) => {
                ring.rotation.z += 0.003 * (index % 2 === 0 ? 1 : -1);
            });
            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
