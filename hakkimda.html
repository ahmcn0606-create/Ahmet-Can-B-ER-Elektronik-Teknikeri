<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="ACB MONOGRAM_SİYAH.png">
    <title>Hakkımda │ Ahmet Can BİÇER</title>
    <link rel="stylesheet" href="css-style.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: #050505; color: #ffffff; font-family: 'Segoe UI', Roboto, sans-serif; overflow-x: hidden; }
        
        body::before { content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-image: radial-gradient(rgba(255, 0, 51, 0.1) 1px, transparent 1px); background-size: 60px 60px; z-index: -1; pointer-events: none; }

        .navbar { display: flex; justify-content: space-between; align-items: center; padding: 15px 40px; background: rgba(11, 11, 11, 0.9); backdrop-filter: blur(10px); position: fixed; width: 100%; top: 0; z-index: 998; border-bottom: 1px solid rgba(255, 0, 51, 0.1); }
        .about-container { max-width: 1200px; margin: 0 auto; padding: 140px 20px 60px 20px; display: grid; grid-template-columns: 350px 1fr; gap: 40px; }
        
        .left-col { display: flex; flex-direction: column; gap: 20px; }
        .right-col { display: flex; flex-direction: column; gap: 40px; }
        
        .info-card { background: rgba(11, 11, 11, 0.6); border: 1px solid rgba(255, 0, 51, 0.2); padding: 25px; border-radius: 8px; }
        
        /* Modal Balon Yapısı */
        .modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #111; border: 1px solid #ff0033; padding: 30px; z-index: 1000; border-radius: 8px; max-width: 500px; width: 90%; }
        
        @media (max-width: 768px) { .about-container { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="navbar-brand"><img src="ACB MONOGRAM_BEYAZ.png" style="width: 38px;"></div>
        <ul class="nav-links" style="display: flex; gap: 20px; list-style: none;">
            <li><a href="index.html" style="color: #ccc; text-decoration: none;">Ana Sayfa</a></li>
            <li><a href="#" style="color: #ff0033; font-weight: 700; text-decoration: none;">Hakkımda</a></li>
        </ul>
    </nav>

    <main class="about-container">
        <!-- SOL SÜTUN: Teknik Bilgi ve Eğitim -->
        <div class="left-col">
            <div class="info-card">
                <h2 style="color: #ff0033; margin-bottom: 15px;">Teknik Bilgi</h2>
                <div style="font-size: 14px; color: #aaa;">Altium, Proteus, C++, SolidWorks...</div>
            </div>
            
            <div class="info-card">
                <h2 style="color: #ff0033; margin-bottom: 15px;">Eğitim & Sertifikalar</h2>
                <button onclick="document.getElementById('eduModal').style.display='block'" style="background: transparent; border: 1px solid #ff0033; color: #fff; padding: 10px; width: 100%; cursor: pointer;">Detayları Görüntüle</button>
            </div>
        </div>

        <!-- SAĞ SÜTUN: Profil ve Deneyim -->
        <div class="right-col">
            <div class="info-card" style="text-align: center;">
                <img src="anasayfa_fotograf.jpeg" style="width: 120px; border-radius: 50%; border: 2px solid #ff0033; margin-bottom: 15px;">
                <h1 style="margin-bottom: 5px;">Ahmet Can BİÇER</h1>
                <p style="color: #ff0033; font-weight: 600;">Elektronik Teknikeri</p>
                <p style="margin-top: 15px; color: #ccc;">Kariyer özeti burada yer alacak...</p>
            </div>

            <div class="info-card">
                <h2 style="color: #ff0033; margin-bottom: 20px;">Deneyim (Sarmal Akış)</h2>
                <!-- Deneyim timeline buraya gelecek -->
            </div>
        </div>
    </main>

    <!-- Modal -->
    <div id="eduModal" class="modal">
        <h3 style="color: #ff0033;">Eğitim Detayları</h3>
        <p style="margin: 15px 0; color: #ccc;">Buraya sertifikalar eklenecek.</p>
        <button onclick="document.getElementById('eduModal').style.display='none'" style="background: #ff0033; border: none; padding: 5px 15px; color: #fff;">Kapat</button>
    </div>

</body>
</html>
