<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="ACB MONOGRAM_SİYAH.png">
    <title>Hakkımda │ Ahmet Can BİÇER</title>
    <link rel="stylesheet" href="css-style.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: #050505; color: #ffffff; font-family: 'Segoe UI', Roboto, sans-serif; overflow-x: hidden; min-height: 100vh; padding-bottom: 70px; }
        body::before { content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-image: radial-gradient(rgba(255, 255, 255, 0.1) 1px, transparent 1px); background-size: 60px 60px; z-index: -1; }

        /* Navbar Kilitli */
        .navbar { display: flex; justify-content: space-between; align-items: center; padding: 15px 40px; background: rgba(11, 11, 11, 0.95); backdrop-filter: blur(10px); position: fixed; width: 100%; top: 0; z-index: 999; }
        .navbar::before { content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 1px; background: linear-gradient(to right, #ffffff, transparent); }
        .navbar::after { content: ""; position: absolute; bottom: 0; left: 0; width: 100%; height: 1px; background: linear-gradient(to left, #ffffff, transparent); }
        
        .info-card { background: rgba(11, 11, 11, 0.7); border: 1px solid #ffffff; padding: 25px; border-radius: 8px; margin-bottom: 20px; box-shadow: inset 0 0 25px rgba(255, 0, 51, 0.3); }
        .edu-btn { background: rgba(255,255,255,0.05); border: 1px solid #ffffff; color: #fff; padding: 10px; cursor: pointer; transition: 0.3s; border-radius: 4px; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .edu-btn:hover { background: #ff0033; border-color: #ff0033; }
        
        /* Modal Yapısı */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 2000; justify-content: center; align-items: center; }
        .modal-content { background: #111; border: 1px solid #ff0033; padding: 30px; border-radius: 8px; width: 80%; max-width: 500px; color: #fff; }
    </style>
</head>
<body>

    <nav class="navbar"> <div class="navbar-brand" style="border: 1px solid #ffffff; border-radius: 50%; padding: 4px;"><img src="ACB MONOGRAM_BEYAZ.png" style="width: 30px;"></div>
        <ul class="nav-links" style="display: flex; gap: 20px; list-style: none;">
            <li><a href="index.html" style="color: #888; text-decoration: none;">Ana Sayfa</a></li>
            <li><a href="#" style="color: #ff0033; font-weight: 700; text-decoration: none;">Hakkımda</a></li>
            <li><a href="projelerim.html" style="color: #888; text-decoration: none;">Projelerim</a></li>
        </ul>
    </nav>

    <main style="max-width: 1200px; margin: 0 auto; padding: 140px 20px 80px 20px; display: grid; grid-template-columns: 350px 1fr; gap: 40px;">
        <div class="left-col">
            <div class="info-card">
                <h2 style="color: #ffffff; margin-bottom: 20px; font-size: 18px;">Deneyim</h2>
                <div style="height: 400px; border-left: 2px solid #ff0033; margin-left: 10px; padding-left: 20px; color: #aaa;">
                    </div>
            </div>
        </div>

        <div class="right-col" style="max-width: 500px;">
            <div class="info-card" style="text-align: center;">
                <img src="anasayfa_fotograf.jpeg" style="width: 120px; border-radius: 50%; margin-bottom: 15px;">
                <h1 style="margin-bottom: 15px; color: #fff;">Ahmet Can BİÇER</h1>
                
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                    <a href="cv.pdf" target="_blank" style="text-decoration:none;"><button class="edu-btn"><span>📄</span> Özgeçmiş</button></a>
                    <a href="sertifikalar.html" target="_blank" style="text-decoration:none;"><button class="edu-btn"><span>🏆</span> Sertifikalar</button></a>
                    <button class="edu-btn" onclick="document.getElementById('detayModal').style.display='flex'"><span>🔍</span> Detay</button>
                    <button class="edu-btn" onclick="document.getElementById('egitimModal').style.display='flex'"><span>🎓</span> Eğitimler</button>
                </div>
            </div>
        </div>
    </main>

    <div id="detayModal" class="modal"><div class="modal-content">
        <h3>Detay</h3> <p>BURAYA İSTEDİĞİN DETAY YAZISINI EKLEYEBİLİRSİN</p>
        <button class="edu-btn" style="margin-top:20px;" onclick="document.getElementById('detayModal').style.display='none'">Kapat</button>
    </div></div>

    <div id="egitimModal" class="modal"><div class="modal-content">
        <h3>Eğitimler</h3> <p>BURAYA İSTEDİĞİN EĞİTİM YAZISINI EKLEYEBİLİRSİN</p>
        <button class="edu-btn" style="margin-top:20px;" onclick="document.getElementById('egitimModal').style.display='none'">Kapat</button>
    </div></div>

    <footer>&copy; 2026 Ahmet Can Biçer. Tüm Hakları Saklıdır.</footer>
</body>
</html>
