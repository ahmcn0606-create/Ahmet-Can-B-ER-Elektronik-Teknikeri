<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>İletişim | Ahmet Can Biçer</title>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; }
        .navbar { display: flex; justify-content: space-between; padding: 20px 50px; align-items: center; border-bottom: 1px solid #333; }
        .logo a { color: #fff; text-decoration: none; font-weight: bold; }
        .nav-right { display: flex; gap: 15px; align-items: center; }
        .content { text-align: center; margin-top: 100px; }
        .contact-box { background: #111; padding: 40px; border: 1px solid #ff0033; display: inline-block; border-radius: 10px; }
        input, textarea { width: 300px; display: block; margin: 10px auto; padding: 10px; }
        .social-links { margin-top: 20px; }
        footer { margin-top: 50px; color: #555; font-size: 12px; }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="logo"><a href="index.html">← Ana Sayfaya Dön</a></div>
        <div class="nav-right">
            <span>TR 🇹🇷</span>
        </div>
    </nav>

    <main class="content">
        <div class="contact-box">
            <h1>Benimle İletişime Geçin</h1>
            <form action="mailto:seninemail@adresin.com" method="post">
                <input type="text" placeholder="Adınız" required>
                <input type="email" placeholder="E-posta Adresiniz" required>
                <textarea placeholder="Mesajınız" rows="5"></textarea>
                <button type="submit" style="background:#ff0033; color:#fff; border:none; padding:10px 20px; cursor:pointer;">Gönder</button>
            </form>

            <div class="social-links">
                <a href="https://instagram.com/kullaniciadi">Instagram</a> | 
                <a href="https://linkedin.com/in/kullaniciadi">LinkedIn</a> | 
                <a href="https://bionluk.com/kullaniciadi">Bionluk</a>
            </div>
        </div>
    </main>

    <footer>&copy; 2026 Ahmet Can Biçer. Tüm Hakları Saklıdır.</footer>

</body>
</html>
